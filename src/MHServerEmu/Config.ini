[Logging]
;            EnableLogging: Enables logging.
;          SynchronousMode: Enables synchronous output for logging (slow, for debugging only).
; HideSensitiveInformation: Hides sensitive information (emails / IP addresses) from logs.
;            EnableConsole: Enables the console output target.
; ConsoleIncludeTimestamps: Enables message timestamps for the console output target.
;          ConsoleMinLevel: Sets the minimum logging level for the console output target [0-5].
;          ConsoleMaxLevel: Sets the maximum logging level for the console output target [0-5].
;          ConsoleChannels: Sets log message sources that the console target accepts.
;               EnableFile: Enables the file output target.
;    FileIncludeTimestamps: Enables message timestamps for the file output target.
;             FileMinLevel: Sets the minimum logging level for the file output target [0-5].
;             FileMaxLevel: Sets the maximum logging level for the file output target [0-5].
;             FileChannels: Sets log message sources that the file target accepts.
;          FileSplitOutput: Splits output into separate files based on message category.

EnableLogging=true
SynchronousMode=false
HideSensitiveInformation=false
EnableConsole=true
ConsoleIncludeTimestamps=true
ConsoleMinLevel=0
ConsoleMaxLevel=5
ConsoleChannels=+Default
EnableFile=false
FileIncludeTimestamps=true
FileMinLevel=0
FileMaxLevel=5
FileChannels=+Default
FileSplitOutput=false

[Frontend]
;           BindIP: IP address for the frontend server to bind to.
;                   Set to 0.0.0.0 to listen on all network interfaces.
;             Port: Port for the frontend server to bind to.
;    PublicAddress: An address of the frontend server that needs to be reachable for clients.
;                   Can be an IP address (e.g. 192.168.1.2) or a URL (e.g. fes2.marvelheroes.com).
; ReceiveTimeoutMS: Number of milliseconds the server waits before closing the connection when trying to receive data from a client.
;                   Set to 0 to wait indefinitely.
;    SendTimeoutMS: Number of milliseconds the server waits before closing the connection when trying to send data to a client.
;                   Set to 0 to wait indefinitely.

BindIP=0.0.0.0
Port=4306
PublicAddress=127.0.0.1
ReceiveTimeoutMS=60000
SendTimeoutMS=6000

[WebFrontend]
;                 Address: Address for the web frontend to listen on.
;                    Port: Port for the web frontend to listen on.
;    EnableLoginRateLimit: Enables rate limiting for login attempts.
;    LoginRateLimitCostMS: Time cost in milliseconds for a single login attempt.
;     LoginRateLimitBurst: The number of times in a row the time cost can be paid before the limit starts applying. Must be >= 2.
;            EnableWebApi: Enables custom web API endpoints.
;         EnableDashboard: Enables a server dashboard accessible from the web API. Requires the web API to be enabled.
;  DashboardFileDirectory: Name of the directory that contains dashboard files. The directory should be placed in Data\Web.
;        DashboardUrlPath: URL path relative to the origin from which the dashboard is served.

Address=localhost
Port=8080
EnableLoginRateLimit=false
LoginRateLimitCostMS=30000
LoginRateLimitBurst=10
EnableWebApi=true
EnableDashboard=true
DashboardFileDirectory=Dashboard
DashboardUrlPath=/Dashboard/

[PlayerManager]
;          EnablePersistence: Allows player data to be saved.
;           UseJsonDBManager: Switches to JSON-based backend for saving player data.
;                             NOTE: JSON backend supports only a single account / user.
; AllowClientVersionMismatch: Allows clients that do not match the server's version of the game to connect.
;               UseWhitelist: When enabled, only clients added to the whitelist via the !account whitelist command are allowed to log in.
;            ShowNewsOnLogin: Requests the client to open the news windows after logging in.
;                    NewsUrl: News URL for the client's news window.
;             ServerCapacity: Indicates the maximum concurrent number of players allowed on the server. Players who exceed this capacity will be put in a queue.
;                             Values <= 0 indicate unlimited capacity.
;       MaxLoginQueueClients: The maximum number of normal priority clients that can be put into the login queue at the same time.
;      EnableTownPlayerLimit: When enabled, town regions respect player limits defined in region prototypes.

EnablePersistence=true
UseJsonDBManager=false
AllowClientVersionMismatch=false
UseWhitelist=false
ShowNewsOnLogin=false
NewsUrl=http://localhost/news/index.html
ServerCapacity=0
MaxLoginQueueClients=8192
EnableTownPlayerLimit=false

[SQLiteDBManager]
;              FileName: Name of the SQLite database file to use relative to the server's Data directory.
;       MaxBackupNumber: The maximum number of backup files to create (oldest backups will be overwritten).
;                        Set this to 0 to disable backups.
; BackupIntervalMinutes: The minimum interval in minutes between backup creation.

FileName=Account.db
MaxBackupNumber=5
BackupIntervalMinutes=15

[JsonDBManager]
;              FileName: Name of the JSON save file to use relative to the server's Data directory
;       MaxBackupNumber: The maximum number of backup files to create (oldest backups will be overwritten)
;                        Set this to 0 to disable backups.
; BackupIntervalMinutes: The minimum interval in minutes between backup creation
;            PlayerName: Player name to assign to the account loaded from JSON

FileName=DefaultPlayer.json
MaxBackupNumber=5
BackupIntervalMinutes=15
PlayerName=Player

[GroupingManager]
;             ServerName: Name in chat for system messages sent by the server.
;    ServerPrestigeLevel: Determines the color of the server's name in system messages.
;                         0 - white, 1 - green, 2 - blue, 3 - purple, 4 - orange, 5 - red, 6 - yellow (cosmic).
;               MotdText: Message of the day text.
;    LogPrivateChatRooms: When enabled, the text of messages in private chat rooms (tell, party, guild) is included in server logs.
;         EnableChatTips: When enabled, the server periodically broadcasts chat tips to all players.
;        ChatTipFileName: Name of the file in the data directory that contains chat tips.
; ChatTipIntervalMinutes: Interval for broadcasting chat tips in minutes.
;         ChatTipShuffle: Randomizes the order of chat tips on load.

ServerName=MHServerEmu
ServerPrestigeLevel=6
MotdText=Welcome to Marvel Heroes! Type !commands for a list of available server commands.
LogPrivateChatRooms=false
EnableChatTips=false
ChatTipFileName=ChatTips.txt
ChatTipIntervalMinutes=15
ChatTipShuffle=false

[GameInstance]
; NumWorkerThreads: The number of worker threads used to process game instances.
;                   This number ideally should not exceed the number of logical CPUs the machine running the server has.
NumWorkerThreads=1

[GameData]
;          LoadAllPrototypes: Preloads all prototypes on server start. Makes server start slower, but removes lag spikes during the game when data is loaded for the first time.
; UseEquipmentSlotTableCache: Enables caching for the EquipmentSlotTable. Makes server start slower if not used with LoadAllPrototypes.
;         EnablePatchManager: Enables Prototype Patch Manager. Fixes mission bugs and prototype errors.
;     EnableLiveTuningEvents: Applies events based on the current date when loading Live Tuning data.
;      AutoRefreshLiveTuning: Automatically reloads Live Tuning data when the daily mission reset happens. Requires EnableLiveTuningEvents.

LoadAllPrototypes=false
UseEquipmentSlotTableCache=false
EnablePatchManager=true
EnableLiveTuningEvents=true
AutoRefreshLiveTuning=true

[GameOptions]
; NOTE: These options are sent from the server to the client and affect the UI in many cases.
;
;                 TeamUpSystemEnabled: Enables team-ups.
;                 AchievementsEnabled: Enables achievements.
;                OmegaMissionsEnabled: Enables shared quests.
;               VeteranRewardsEnabled: Enables login rewards.
;             MultiSpecRewardsEnabled: Enables multi-specs.
;                      GiftingEnabled: Enables gifting in the in-game store.
;            CharacterSelectV2Enabled: Enables the newer starting hero selection screen for new players. Falls back to V1 when disabled.
;              CommunityNewsV2Enabled: Enables the newer community news window. Falls back to V1 when disabled.
;                 LeaderboardsEnabled: Enables leaderboards.
;          NewPlayerExperienceEnabled: Enables the tutorial for new players.
;             MissionTrackerV2Enabled: Enables the newer mission tracker. Falls back to V1 when disabled.
;     GiftingAccountAgeInDaysRequired: Number of days an account needs to exist for to unlock store gifting.
;          GiftingAvatarLevelRequired: Minimum avatar level that needs to be reached to unlock store gifting.
;           GiftingLoginCountRequired: Number of days an account needs to log in for to unlock store gifting.
;               InfinitySystemEnabled: Enables the Infinity system. Falls back to the Omega system when disabled.
; ChatBanVoteAccountAgeInDaysRequired: Number of days an account needs to exist for to unlock chat spam reporting.
;      ChatBanVoteAvatarLevelRequired: Minimum avatar level that needs to be reached to unlock chat spam reporting.
;       ChatBanVoteLoginCountRequired: Number of days an account needs to log in for to unlock chat spam reporting.
;           IsDifficultySliderEnabled: Enables region difficulty selection.
;                OrbisTrophiesEnabled: Enables PS4 trophy unlocks (unused in the PC version).

TeamUpSystemEnabled=true
AchievementsEnabled=true
OmegaMissionsEnabled=true
VeteranRewardsEnabled=true
MultiSpecRewardsEnabled=true
GiftingEnabled=true
CharacterSelectV2Enabled=true
CommunityNewsV2Enabled=true
LeaderboardsEnabled=false
NewPlayerExperienceEnabled=true
MissionTrackerV2Enabled=true
GiftingAccountAgeInDaysRequired=7
GiftingAvatarLevelRequired=20
GiftingLoginCountRequired=5
InfinitySystemEnabled=true
ChatBanVoteAccountAgeInDaysRequired=7
ChatBanVoteAvatarLevelRequired=20
ChatBanVoteLoginCountRequired=5
IsDifficultySliderEnabled=true
OrbisTrophiesEnabled=true

[CustomGameOptions]
;             AutosaveIntervalMinutes: Determines the interval for saving player data when not transferring between regions. Set to <= 0 to disable autosaving.
;           ESCooldownOverrideMinutes: Overrides the default Eternity Splinter drop cooldown duration when the value is >= 0.
;                     CombineESStacks: Combine multiple Eternity Splinter stacks into a single item when they drop at the same time.
;                   AutoUnlockAvatars: Automatically unlocks all avatars for players who have finished the tutorial.
;                   AutoUnlockTeamUps: Automatically unlocks all team-ups for players who have finished the tutorial.
;      DisableMovementPowerChargeCost: Disables charge costs for movement powers to imitate pre-BUE behavior.
;               AllowSameGroupTalents: Allows mutually exclusive talents to be enabled at the same time.
;         EnableCreditChestConversion: Allows conversion of credits to sellable chest items via the !item creditchest command.
;     CreditChestConversionMultiplier: Cost multiplier for converting credits to chest items.
;                DisableInstancedLoot: Makes loot free-for-all, Diablo 2 style.
;             LootSpawnGridCellRadius: Affects the spacing of loot that drops [16-128].
; TrashedItemExpirationTimeMultiplier: Affects how long items trashed by players remain on the ground.
;               DisableAccountBinding: Disables account binding on pickup for items.
;             DisableCharacterBinding: Disables character binding on equip for items.
;             DisableMissionXPBonuses: Prevents mission experience rewards from being affected by experience bonuses.
;                UsePrestigeLootTable: Replaces starting costume prestige rewards with the loot table specified in game data.
;              EnableUltimatePrestige: Allows prestige level to be reset after reaching the prestige level cap.
;       ApplyHiddenPvPDamageModifiers: Enables hidden damage modifiers based on K/D ratio, match history, and Omega level in PvP combat.
; //==============================================================================
;                ItemAutoPickupEnable: Auto-pickup currency-style items (Eternity Splinters, Cube Shards, Runestones, all Marks, etc.) within ItemAutoPickupRadius. Off by default.
;                ItemAutoPickupRadius: Radius (in world units) around the avatar within which currency items are auto-picked-up. Default 400 matches the InteractRange.
;            ItemAutoPickupIntervalMs: Server-side scan interval in milliseconds. Lower = more responsive, slightly more CPU. Floor 50 ms.
;                 LootFilterEnable: Enables the '!filter' chat command system for Ring, Medal, and Insignia rarity-based filtering. On by default.
;     LootFilterCharacterSpecificEnable: When enabled, filters out items bound to a different character than the one currently being played (e.g. a Venom-only costume dropping while playing Hulk). Any-Hero items and items bound to the current character are kept.
;    ItemAutoPickupCraftingIngredientEnable: Auto-pickup nearby crafting ingredients (e.g. catalysts, crafting mats). Reuses ItemAutoPickupRadius.
;   ItemAutoPickupCraftingIngredientToStash: When enabled, crafting ingredients picked up automatically are sent to the stash instead of general inventory.
;                         ItemAutoPickupRelicEnable: Auto-pickup nearby relic items. Reuses ItemAutoPickupRadius.
;                          ItemAutoPickupRelicToStash: When enabled, relics picked up automatically are sent to the stash instead of general inventory.
;           ItemAutoPickupRelicEquipIfSameTypeEquippedEnable: When enabled, if the current avatar already has a relic of the same type equipped, the picked-up relic is moved directly to the equipped relic stack.
;                         ItemAutoPickupRelicLoggingEnable: Logging for relic auto-pickup (for debugging).
;                          ItemAutoPickupRuneEnable: Auto-pickup nearby runeword glyphs (runes). Reuses ItemAutoPickupRadius.
;                           ItemAutoPickupRuneToStash: When enabled, runes picked up automatically are sent to the stash instead of general inventory.
;                          ItemAutoPickupRuneLoggingEnable: Logging for rune auto-pickup (for debugging).
;         ThrowableDisableInteractive: Completely disables the ability for players to pick up and throw objects.
;     ThrowableAutoCancelOnPowerUse: When true, attempting to use any other power while holding a throwable will silently drop the object and allow the new power to proceed.
;           ThrowableAutoThrowOnMovementPower: When true, activating a movement / travel power while holding a throwable will automatically throw it before starting movement.
;              ItemChestAutoOpenEnable: Automatically opens chest items in the general inventory on a cooldown timer.
;         ItemChestAutoOpenCooldownMs: Milliseconds between each automatic chest opening. Minimum 500 ms.
;         ItemChestAutoOpenWhitelist: Comma-separated list of prototype name substrings that identify chests to auto-open.
;          ItemChestAutoOpenLoggingEnable: Logging for chest auto-open (for debugging).
;                     IncursionEnable: Master switch for the experimental invasion system. When on, a hostile invader spawns near players in non-hub regions on a timer.
;                  IncursionIntervalMs: Milliseconds between invasion waves. Default 60000 (one minute). Minimum 1000 ms.
;          IncursionRandomIntervalMaxMs: Maximum additional random milliseconds added to IncursionIntervalMs for each wave. Default 360000 (6 minutes) gives a 3-9 minute range when combined with the default 180000 ms interval.
;              IncursionEnemyPrototype: Prototype name (full Calligraphy path) of the invader's COMBAT BODY (server-driven agent). Leave empty for the default proven boss. Playable avatars cannot be used.
;                                       NOTE: The client render skin (which avatar/costume the invader is drawn as) is NOT configurable. Each invasion enemy type (IncursionEnemy* subclass) defines its own avatar and costume, and one is picked at random per spawn.
;              IncursionLogVerboseEnable: When true, logs detailed per-tick/per-spawn invasion diagnostics to help debug the system.
;         IncursionCommandsRequireAdmin: When true, in-game '!incursion' commands require an admin account. Server console is always allowed.
;         IncursionLogAllDamageTargetsEnable: When true, logs incursion enemy damage dealt to ALL targets (turrets, NPCs, etc.). When false (default), only logs damage dealt to player avatars for cleaner tuning output.

AutosaveIntervalMinutes=15
ESCooldownOverrideMinutes=-1.0
CombineESStacks=false
AutoUnlockAvatars=false
AutoUnlockTeamUps=false
DisableMovementPowerChargeCost=false
AllowSameGroupTalents=false
EnableCreditChestConversion=false
CreditChestConversionMultiplier=2.0
DisableInstancedLoot=false
LootSpawnGridCellRadius=20.0
TrashedItemExpirationTimeMultiplier=1.0
DisableAccountBinding=false
DisableCharacterBinding=true
DisableMissionXPBonuses=false
UsePrestigeLootTable=false
EnableUltimatePrestige=false
ApplyHiddenPvPDamageModifiers=false
; //==============================================================================
;          MODDED FEATURES = LootFilter , ItemAutoPickup , ThrowableDisable , ItemChestAutoOpen , Incursion , TerminalDailyCompleteAnyDifficulty
;          LOOT FILTER
LootFilterEnable=true
LootFilterCharacterSpecificEnable=true ; SoloSelfFound-ish removes findings items specific to others , progress character specific equipment gear only when playing that character
LootFilterLoggingEnable=false
;          ITEM AUTO PICKUP to STASH = currency , crafting , relics , runes
ItemAutoPickupEnable=true
ItemAutoPickupRadius=1400.0
ItemAutoPickupIntervalMs=2100
;             - crafting 
ItemAutoPickupCraftingIngredientEnable=true
ItemAutoPickupCraftingIngredientToStash=true
ItemAutoPickupCraftingIngredientLoggingEnable=false
;             - relics
ItemAutoPickupRelicEnable=true
ItemAutoPickupRelicToStash=true
ItemAutoPickupRelicEquipIfSameTypeEquippedEnable=true
ItemAutoPickupRelicLoggingEnable=false
;             - runes
ItemAutoPickupRuneEnable=true
ItemAutoPickupRuneToStash=true
ItemAutoPickupRuneLoggingEnable=false
;          THROWABLE DISABLE = preference to not throw , dont get animlocked by throwing
ThrowableDisableInteractive=true
ThrowableAutoCancelOnPowerUse=true
ThrowableAutoThrowOnMovementPower=true
;          ITEM CHEST AUTO OPEN = opens chests and giftboxes in player inventory 
ItemChestAutoOpenEnable=true
ItemChestAutoOpenCooldownMs=1100
ItemChestAutoOpenWhitelist=Chest,Crate,LootBox,Giftbox,GiftBox
ItemChestAutoOpenLoggingEnable=false
;          INCURSION = spawns random Hero Variant minibosses at random intervals - EXPERIMENTAL
IncursionEnable=true
IncursionIntervalMs=180000 ; 3 minutes minimum 
IncursionRandomIntervalMaxMs=360000 ; 6 minutes random range
IncursionDeathGracePeriodMs=20000 ; 20s controller kept alive because of Lingering DoTs still need reference the damage scale
IncursionEnemyDamageTakenMultiplier=2.0 ; incoming damage multiplier ( goal = short lived but dangerous )
IncursionEnemyVisualScale=1.5 ; visual size/bounds multiplier at spawn (1.0=normal, 1.5=50% larger)
IncursionEnemyDamageMultiplier=1.0 ; final outgoing damage multiplier applied AFTER per-ability scale (1.0=no change, 1.5=+50%, 0.5=half)
IncursionExcludeEnemies=RasputinIV ; chimera wip animations of others powers needs fix
IncursionEnemyPrototype= ; defaults to a patrol boss base , with "half" health due to the damage-taken multiplier above.  
IncursionCommandsRequireAdmin=false ; lets anyone use incursion commands for testing
IncursionLoggingEnable=false
IncursionLogVerboseEnable=false
IncursionLogAllDamageTargetsEnable=false
IncursionLogCollatorEnable=false ; saves per incursion fight log to file
;          TERMINAL DAILY COMPLETE any DIFFICULTY = any difficulty clears available - NOT WORKING
TerminalDailyCompleteAnyDifficultyEnable=false
TerminalDailyCompleteAnyDifficultyLoggingEnable=false
;          INTERACT NEARBY AUTO = mission objectives , civilians , chests
InteractNearbyAutoEnable=true
InteractNearbyAutoIntervalMs=250
InteractNearbyAutoLoggingEnable=false
InteractNearbyAutoWhitelist=DoombotFactoryCommandConsole,HeroCommendationReward,BoxcarMutantDesirae,
InteractNearbyAutoBlacklist=StanLee,Stash,Vendor,Waypoint,GLFSupplyOfficer,Trans,Transition,EGPVEManhattan,EGPVESubterranea,Elevator,Door,Floor,Portal,DefaultEND,ReturnToLastBase,XMansionToHeli,
;          DANGER ROOM COMBINE COMMAND = combines lower-rarity scenarios into higher-rarity ones
DangerRoomCombineCommandEnable=true
; //==============================================================================

[MTXStore]
; GazillioniteBalanceForNewAccounts: The amount of Gs new accounts will get when they log in for the first time.
;   ESToGazillioniteConversionRatio: The amount of Gs players will get for each Eternity Splinter when converting them.
;    ESToGazillioniteConversionStep: Step for the Eternity Splinter amount when converting to G. Used to avoid rounding errors.
;         GiftingOmegaLevelRequired: Minimum Omega level required to purchase gifts for other players (if Omega is enabled).
;      GiftingInfinityLevelRequired: Minimum Infinity level required to purchase gifts for other players (if Infinity is enabled).
;                       HomePageUrl: URL for the page displayed on the Home tab.
;                 HomeBannerPageUrl: URL for the top banner displayed when the Home tab is selected.
;               HeroesBannerPageUrl: URL for the top banner displayed when the Heroes tab is selected.
;             CostumesBannerPageUrl: URL for the top banner displayed when the Costumes tab is selected.
;               BoostsBannerPageUrl: URL for the top banner displayed when the Items tab is selected.
;               ChestsBannerPageUrl: URL for the top banner displayed when the Cards tab is selected.
;             SpecialsBannerPageUrl: URL for the top banner displayed when the Specials tab is selected.
;                      RealMoneyUrl: URL for the page displayed in the add G window.
;         RewriteOriginalBundleUrls: When enabled, rewrites original bundle URLs pointing to the Gazillion CDN with new prefixes.
;                     BundleInfoUrl: URL used to rewrite Gazillion bundle info URLs (if enabled).
;                    BundleImageUrl: URL used to rewrite Gazillion bundle image URLs (if enabled).

GazillioniteBalanceForNewAccounts=10000
ESToGazillioniteConversionRatio=2.25
ESToGazillioniteConversionStep=4
GiftingOmegaLevelRequired=0
GiftingInfinityLevelRequired=0
HomePageUrl=http://localhost/store/index.html
HomeBannerPageUrl=http://localhost/store/images/banner.png
HeroesBannerPageUrl=http://localhost/store/images/banner.png
CostumesBannerPageUrl=http://localhost/store/images/banner.png
BoostsBannerPageUrl=http://localhost/store/images/banner.png
ChestsBannerPageUrl=http://localhost/store/images/banner.png
SpecialsBannerPageUrl=http://localhost/store/images/banner.png
RealMoneyUrl=https://localhost/MTXStore/AddG
RewriteOriginalBundleUrls=true
BundleInfoUrl=http://localhost/bundles/
BundleImageUrl=http://localhost/bundles/images/

[Leaderboards]
;            DatabaseFile: Name of the SQLite database file to use relative to the server's Data/Leaderboards directory.
;            ScheduleFile: Name of the JSON schedule file to use relative to the server's Data/Leaderboards directory
; AutoSaveIntervalMinutes: The minimum interval in minutes between leaderboard entry autosaves to the database.

DatabaseFile=Leaderboards.db
ScheduleFile=LeaderboardSchedule.json
AutoSaveIntervalMinutes=10
